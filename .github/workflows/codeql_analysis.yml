name: "CodeQL"

on:
  workflow_dispatch:
  # push:
    # branches:
      # - develop
  # pull_request:
    # branches:
      # - develop

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
    - name: Setup build environment
      uses: agrahn/android-password-store/.github/reusable-workflows/setup-gradle@develop

    - name: Initialize CodeQL
      uses: github/codeql-action/init@6e5455904168f98c75d8e5ad848b4dc4ab3ae77e # v3.28.7
      with:
        languages: java
        tools: latest
        queries: +security-extended

    - name: Build project
      shell: bash
      run: ./gradlew assembleFreeRelease

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@6e5455904168f98c75d8e5ad848b4dc4ab3ae77e # v3.28.7
      with:
        category: "/language:java"
